name: Windows

on:
  push:
    branches: [master, develop, "milestone/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".planning/**"
  pull_request:
    branches: [master,develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".planning/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake . -B build -A x64 `
            -DCARTAN_BUILD_TESTS=ON `
            -DCARTAN_BUILD_EXAMPLES=OFF `
            -DCARTAN_CMAKE_FETCH_DEPS=ON `
            '-DCMAKE_CXX_FLAGS=/std:c++latest /W4 /EHsc'

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: cd build && ctest -C Release --output-on-failure --timeout 30

  install-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Eigen
        run: vcpkg install eigen3:x64-windows

      - name: Configure
        run: |
          cmake . -B build -A x64 `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DCARTAN_CMAKE_FETCH_DEPS=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            '-DCMAKE_CXX_FLAGS=/std:c++latest /EHsc'

      - name: Build and install
        run: |
          cmake --build build --config Release
          cmake --install build --config Release

      - name: Build consumer
        run: |
          cmake tests/integration/consumer -B build-consumer -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            '-DCMAKE_CXX_FLAGS=/std:c++latest /EHsc'
          cmake --build build-consumer --config Release

      - name: Run consumer test
        run: |
          build-consumer/Release/integration_test.exe
