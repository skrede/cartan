name: Embedded

on:
  push:
    branches: [master, develop, 'milestone/**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.planning/**'
  pull_request:
    branches: [master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.planning/**'
  workflow_dispatch:

jobs:
  arm-crosscompile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cortex-m7-h753zi
            flags: "-mcpu=cortex-m7 -mfpu=fpv5-d16 -mfloat-abi=hard -mthumb"
          - name: cortex-m4f-nrf52840
            flags: "-mcpu=cortex-m4 -mfpu=fpv4-sp-d16 -mfloat-abi=hard -mthumb"

    # Pinned to ubuntu-24.04 (not ubuntu-latest): noble ships gcc-arm-none-eabi
    # 13.2 with the C++ driver and a newlib libstdc++, which the older archive
    # toolchains lacked. The GCC-13 / C++20 guarantee holds only on this image.
    runs-on: ubuntu-24.04
    name: arm (${{ matrix.name }})

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install arm-none-eabi toolchain and Eigen
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib libeigen3-dev

      - name: Cross-compile the representative translation unit
        run: |
          arm-none-eabi-g++ -std=c++20 -Os -fno-exceptions -fno-rtti -DNDEBUG \
            ${{ matrix.flags }} \
            -I/usr/include/eigen3 \
            -I lib/cartan-lie/include \
            -I lib/cartan-serial-chain/include \
            -I lib/cartan-analytical/include \
            -c tests/embedded/arm-crosscompile/representative_tu.cpp -o tu.o

  esp-idf:
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32c3]

    runs-on: ubuntu-24.04
    name: esp-idf (${{ matrix.target }})

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build the exceptions-off smoke
        uses: espressif/esp-idf-ci-action@e6f5c74232b1ccd4c97ed641f1e48553853f1fd5 # v1.2.0
        with:
          esp_idf_version: v5.1
          target: ${{ matrix.target }}
          path: tests/embedded/esp32-smoke
